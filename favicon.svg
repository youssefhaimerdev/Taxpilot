<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#05101E"/>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1829"/>
      <stop offset="100%" stop-color="#05101E"/>
    </linearGradient>
  </defs>
  <!-- Dollar sign -->
  <text x="32" y="44" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#00D4A0">$</text>
  <!-- Small top-right plane accent -->
  <text x="46" y="22" text-anchor="middle" font-family="Arial" font-size="14" fill="#F0AC45">✈</text>
</svg>
